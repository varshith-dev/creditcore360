version: '3.8'

services:
  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: intelli-credit-webtop
    ports:
      - "3000:3000"
    volumes:
      - webtop_data:/config
      - ./cam_outputs:/cam_outputs
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: intelli-credit-backend
    network_mode: host
    volumes:
      - ./cam_outputs:/cam_outputs
      - ./uploads:/uploads
      - /tmp:/tmp
    environment:
      - OLLAMA_BASE_URL=http://127.0.0.1:11434
      - OLLAMA_MODEL=gpt-oss
      - PYTHONPATH=/app
    restart: unless-stopped
    depends_on:
      - webtop

  nginx:
    build: ./nginx
    container_name: intelli-credit-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/logs:/var/log/nginx
    restart: unless-stopped
    depends_on:
      - webtop
      - backend

volumes:
  webtop_data:
