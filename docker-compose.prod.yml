version: '3.8'

services:
  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelli-credit-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - intelli-credit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend FastAPI Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelli-credit-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gpt-oss
      - OLLAMA_TIMEOUT_SECONDS=120
      - OCR_CONFIDENCE_THRESHOLD=70
      - MAX_UPLOAD_SIZE_MB=50
      - CAM_OUTPUT_DIR=/tmp/cam_outputs
      - SECTOR_CAP_NBFC=500
      - SECTOR_CAP_MANUFACTURING=200
      - SECTOR_CAP_TRADING=100
      - SECTOR_CAP_SERVICES=150
      - API_TIMEOUTS_ECOURTS=30
      - API_TIMEOUTS_MCA21=30
      - API_TIMEOUTS_NEWS_API=30
      - API_TIMEOUTS_RBI_FEED=30
      - DISTILBERT_MODEL=distilbert-base-uncased
    volumes:
      - ./cam_outputs:/tmp/cam_outputs
      - ./logs:/var/log/intelli-credit
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama
    networks:
      - intelli-credit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: intelli-credit-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/root/.ollama/models
    networks:
      - intelli-credit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 4G

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: intelli-credit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - intelli-credit-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Named volumes for data persistence
volumes:
  ollama_data:
    driver: local
  models:
    driver: local
  cam_outputs:
    driver: local
  logs:
    driver: local
  ssl:
    driver: local

networks:
  intelli-credit-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
